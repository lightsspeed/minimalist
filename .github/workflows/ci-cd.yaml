name: Deployment Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'
      - 'charts/**'
      - 'README.md'
      - '.gemini/**'

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: vars
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-6)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: lightsspeed/minimalist:${{ steps.vars.outputs.tag }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}

  update-gitops:
    name: Update ArgoCD Manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Manifest
        run: |
          sed -i 's|image: .*minimalist:.*|image: docker.io/lightsspeed/minimalist:'"${{ needs.build-and-push.outputs.tag }}"'|g' k8s/deployment.yaml

      - name: Commit and Push
        run: |
          git config --global user.name "GitOps Bot"
          git config --global user.email "gitops@lightsspeed.com"
          git add k8s/deployment.yaml
          git commit -m "chore(gitops): deploy image tag ${{ needs.build-and-push.outputs.tag }} [skip ci]" || echo "No changes"
          git push
