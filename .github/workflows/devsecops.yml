name: DevSecOps & GitOps Overhaul (Template)

# This is a dummy pipeline file and will NOT trigger automatically on main.
# It is designed as a template for a complete DevSecOps overhaul.
on:
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - 'dummy-pipeline-overhaul' # Only triggers on this non-existent branch

jobs:
  security-and-lint:
    name: 1. Security & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Run Linting
        run: npm run lint
        continue-on-error: true

      - name: Trivy FS & SCA Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs,config'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  build-and-scan:
    name: 2. Build & Container Scan
    needs: security-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/minimalist:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/minimalist:${{ github.sha }}
          load: true # Load into local docker daemon for scanning

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/minimalist:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fail if critical vulnerabilities found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  dast-and-k8s:
    name: 3. DAST & K8s Validation
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Kube-Linter Scan
        uses: stackrox/kube-linter-action@v1
        with:
          directory: k8s
        continue-on-error: true

      - name: Run DAST (OWASP ZAP Baseline)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'https://your-dev-url.com' # Replace with your dynamic dev environment URL
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

  gitops-deploy:
    name: 4. GitOps & ArgoCD Sync
    needs: dast-and-k8s
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_GITOPS || secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes Manifest
        run: |
          sed -i 's|image: .*minimalist.*|image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/minimalist:'"${{ github.sha }}"'|g' k8s/deployment.yaml
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitOps Bot"
          git config --global user.email "gitops@lightsspeed.com"
          git add k8s/deployment.yaml
          git commit -m "chore(gitops): deploy image tag ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
