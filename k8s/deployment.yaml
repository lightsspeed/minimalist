apiVersion: apps/v1
kind: Deployment
        version: v1.0.4
    spec:
      containers:
      - name: lightsspeed-mini
        # Production Best Practice: Fully Qualified Domain Name (FQDN) for Registry
        image: docker.io/lightsspeed/minimalist:701e39
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: VITE_SUPABASE_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: lightsspeed-config
              key: VITE_SUPABASE_PROJECT_ID
        - name: VITE_SUPABASE_URL
          valueFrom:
            configMapKeyRef:
              name: lightsspeed-config
              key: VITE_SUPABASE_URL
        - name: VITE_SUPABASE_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: lightsspeed-secret
              key: VITE_SUPABASE_PUBLISHABLE_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3


