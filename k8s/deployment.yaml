apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightsspeed-mini
  namespace: lightsspeed
  labels:
    app: lightsspeed-mini
    version: v1.0.4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lightsspeed-mini
  template:
    metadata:
      labels:
        app: lightsspeed-mini
        version: v1.0.4
    spec:
      containers:
      - name: lightsspeed-mini
        # image: 670246014226.dkr.ecr.us-east-1.amazonaws.com/minimalist:v1.0.4
        image: minimalist:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: VITE_SUPABASE_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: lightsspeed-config
              key: VITE_SUPABASE_PROJECT_ID
        - name: VITE_SUPABASE_URL
          valueFrom:
            configMapKeyRef:
              name: lightsspeed-config
              key: VITE_SUPABASE_URL
        - name: VITE_SUPABASE_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: lightsspeed-secret
              key: VITE_SUPABASE_PUBLISHABLE_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
